id: "14_xkcd_archive_100"
title: "xkcd — comic #100 via the archive"
tier: 3

prompt: |
  Start at xkcd.com. Use the site's archive (the link "Archive" in the
  top navigation, which goes to xkcd.com/archive/) to navigate to
  comic number 100. Do not type the URL xkcd.com/100 directly — find
  the comic by browsing the archive page.

  Once on comic #100, report the comic's title (the heading above the
  image) and the comic's "title attribute" / mouseover tooltip text
  (the text that appears when you hover over the comic image — in HTML
  it's the `title="..."` attribute on the img tag, NOT the `alt=`
  attribute). Report this verbatim — not paraphrased.

  Return your final answer as JSON in this exact shape:
  {
    "title": "...",
    "alt_text": "..."
  }

  (Field name `alt_text` is kept for schema stability; the value should
  be the title-attribute / mouseover text, not the HTML alt attribute.)

  If you cannot complete the task, return: {"failed": true, "reason": "..."}

max_actions: 60
max_duration_s: 360

judge_rubric: |
  Verify from the agent's final answer AND the final screenshot that:
  1. The screenshot shows xkcd.com/100 (URL visible or page indicates
     comic #100).
  2. `title` field equals "Family Circus" (the comic-#100 title shown
     above the image).
  3. `alt_text` field starts with or contains "This was my friend
     David's idea" (the title-attribute / mouseover text for comic
     #100 references how the author got the idea for the site from
     his friend David). Award credit if this substring appears, even
     if the agent truncated the rest.

  Cheating check: examine the action log (passed to you separately).
  If the agent navigated directly to xkcd.com/100 without visiting
  xkcd.com/archive/ first, score is 0 regardless of answer content.

  Score: 1.0 if all 3 pass and the agent visited the archive.
  0.5 if title is right but alt_text doesn't contain the substring.
  0.0 if the comic was never reached, or the agent cheated.
